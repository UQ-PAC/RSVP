<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'parents')}">

<body>

  <h2 th:text="#{parents}">Parents</h2>

  <table id="parents" class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{name}">Name</th>
        <th th:text="#{address}">Address</th>
        <th th:text="#{city}">City</th>
        <th th:text="#{telephone}">Telephone</th>
        <th th:text="#{children}">Children</th>
        <th th:text="#{clinics}">Clinics</th> </tr>
      </tr>
    </thead>
    <tbody>
      <tr th:each="parent : ${listParents}" th:classappend="${!authMap[parent.id].startsWith('Access Granted.')} ? 'text-muted bg-light' : ''">
        <td>
          <span th:if="${authMap[parent.id].startsWith('Access Granted.')}">
            <i class="fa fa-unlock" aria-hidden="true" th:title="${authMap[parent.id]}"></i>
            <a th:href="@{/parents/__${parent.id}__}" th:text="${parent.firstName + ' ' + parent.lastName}" /></a>
          </span>
          <span th:unless="${authMap[parent.id].startsWith('Access Granted.')}">
            <i class="fa fa-lock" aria-hidden="true" th:title="${authMap[parent.id]}"></i>
            <span th:text="${parent.firstName + ' ' + parent.lastName}"></span>
          </span>
        </td>
        <span th:if="${authMap[parent.id].startsWith('Access Granted.')}">
          <td th:text="${parent.address}" />
          <td th:text="${parent.city}" />
          <td th:text="${parent.telephone}" />
          <td><span th:text="${#strings.listJoin(parent.children, ', ')}" /></td>
          <td th:text="${parent.clinicDescriptions}"></td> </span>
        </span>
        <span th:unless="${authMap[parent.id].startsWith('Access Granted.')}"></span>
      </tr>
    </tbody>
  </table>
  <div th:if="${totalPages > 1}">
    <span th:text="#{pages}">Pages:</span>
    <span>[</span>
    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
      <a th:if="${currentPage != i}" th:href="@{'/parents?page=' + ${i}}">[[${i}]]</a>
      <span th:unless="${currentPage != i}">[[${i}]]</span>
    </span>
    <span>]&nbsp;</span>
    <span>
      <a th:if="${currentPage > 1}" th:href="@{'/parents?page=1'}" th:title="#{first}" class="fa fa-fast-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{first}" class="fa fa-fast-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage > 1}" th:href="@{'/parents?page=__${currentPage - 1}__'}" th:title="#{previous}"
        class="fa fa-step-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{previous}" class="fa fa-step-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}" th:href="@{'/parents?page=__${currentPage + 1}__'}" th:title="#{next}"
        class="fa fa-step-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{next}" class="fa fa-step-forward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}" th:href="@{'/parents?page=__${totalPages}__'}" th:title="#{last}"
        class="fa fa-fast-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{last}" class="fa fa-fast-forward"></span>
    </span>
  </div>
</body>

</html>
