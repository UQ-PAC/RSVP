<!DOCTYPE html>

<html th:fragment="layout (template, menu)" xmlns:th="https://www.thymeleaf.org">

<head>

  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" type="image/x-icon" th:href="@{/resources/images/{imageName}(imageName=${@imageRandomizer.getRandomImage()})}">
  <title th:text="#{title}">ChildrenClinic :: A Spring Framework With Cedar Demonstration</title>
  <link th:href="@{/webjars/font-awesome/css/font-awesome.min.css}" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/resources/css/childclinic.css}" />
  <link rel="stylesheet" th:href="@{/resources/css/cedarexception.css}" />

</head>

<body class="d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-lg navbar-dark" role="navigation">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/}" style="display: flex; align-items: center; justify-content: center; width: 150px; height: 60px; padding: 0;">
        <img th:src="@{/resources/images/{imageName}(imageName=${@imageRandomizer.getRandomImage()})}" alt="Logo" style="max-height: 50px; width: auto; filter: invert(100%);" />
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-navbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="main-navbar" style>

        <ul class="navbar-nav me-auto mb-2 mb-lg-0" th:remove="all">

          <li th:fragment="menuItem (link,active,title,glyph,text)" th:class="nav-item">
            <a th:class="${active==menu ? 'nav-link active' : 'nav-link'}" th:href="@{__${link}__}" th:title="${title}">
              <span th:class="'fa fa-'+${glyph}" class="fa fa-home"></span>
              <span th:text="${text}">Template</span>
            </a>
          </li>

        </ul>

        <ul class="nav navbar-nav me-auto">

          <li th:replace="~{::menuItem ('/','home','home page','home',#{home})}">
            <span class="fa fa-home" aria-hidden="true"></span>
            <span th:text="#{home}">Home</span>
          </li>

          <li th:replace="~{::menuItem ('/parents/find','parents','find parents','search',#{findParents})}">
            <span class="fa fa-search" aria-hidden="true"></span>
            <span th:text="#{findParents}">Find parents</span>
          </li>

          <li th:replace="~{::menuItem ('/doctors.html','doctors','doctors','th-list',#{doctors})}">
            <span class="fa fa-th-list" aria-hidden="true"></span>
            <span th:text="#{doctors}">Doctors</span>
          </li>

          <li
            th:replace="~{::menuItem ('/oups','error','trigger a RuntimeException to see how it is handled','exclamation-triangle',#{error})}">
            <span class="fa exclamation-triangle" aria-hidden="true"></span>
            <span th:text="#{error}">Error</span>
          </li>

        </ul>

        <ul class="nav navbar-nav ms-auto align-items-right">

          <!-- <li class="nav-item d-flex align-items-center">
            <span class="navbar-text text-light ms-3" th:if="${currentUser != null and currentUser.username != 'Guest'}" th:text="${currentUser.username}"></span>
            <span class="navbar-text text-light ms-3" th:unless="${currentUser != null and currentUser.username != 'Guest'}" th:text="Guest"></span>
          </li> -->

          <li class="nav-item d-flex align-items-center">
            <span class="navbar-text text-light ms-3" th:if="${currentUser != null and currentUser.username != 'Guest'}" th:text="${currentUser.getRoleDescriptions() + ' @ ' + currentUser.getClinicDescriptions()}"></span>
          </li>

          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <span class="fa fa-user" aria-hidden="true"></span>
                <span th:if="${currentUser != null and currentUser.username != 'Guest'}" th:text="${currentUser.username}"></span>
                <span th:unless="${currentUser != null and currentUser.username != 'Guest'}" th:text="Guest"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="navbarDropdown">
                <li><h6 class="dropdown-header">System Users</h6></li>
                <li><a class="dropdown-item" href="/switch-user?username=Guest">Guest</a></li>

                <li><hr class="dropdown-divider"></li>

                <li><h6 class="dropdown-header">Database Users</h6></li>
                <li th:each="user : ${dynamicUsers}">
                    <a class="dropdown-item" 
                      th:href="@{/switch-user(username=${user.username})}"
                      th:text="${user.username + ' (' + user.getRoleDescriptions() + ' @ ' + user.getClinicDescriptions() + ')'}">Dynamic User</a>
                </li>
            </ul>
          </li>

          <li class="nav-item mt-2 mt-lg-0 ms-lg-3 d-flex align-items-center justify-content-end justify-content-lg-start">
            <button type="button" class="btn btn-primary my-auto" data-bs-toggle="modal" data-bs-target="#cedarLogsModal" title="Cedar Logs">
              <img th:src="@{/resources/images/cedar-logo-small.svg}" alt="Cedar Logo" style="max-height: 50px; width: auto;" />
            </button>
            <div class="modal fade" id="cedarLogsModal" tabindex="-1" aria-labelledby="Cedar Authorisation Logs" aria-hidden="true">
              <div class="modal-dialog modal-lg">
                <div class="modal-content">
                  <div class="modal-header">
                    <h1 class="modal-title fs-5" id="Cedar Authorisation Logs">Cedar Authorisation Logs</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body" style="max-height: 400px; overflow-y: auto;">
                    <ul class="list-group" th:if="${(cedarLogs != null and !cedarLogs.isEmpty()) or (authorizationMap != null and !authorizationMap.isEmpty())}">
                      <li class="list-group-item" th:if="${cedarLogs != null and !cedarLogs.isEmpty()}" th:each="log : ${cedarLogs}" th:utext="${@cedarFormatter.format(log)}" th:classappend="${#strings.contains(log, 'Access Granted')} ? 'list-group-item-success' : (${#strings.contains(log, 'Access Denied')} ? 'list-group-item-danger' : 'list-group-item-warning')"></li>
                      <li class="list-group-item" th:if="${authorizationMap != null and !authorizationMap.isEmpty()}" th:each="entry : ${authorizationMap}" th:classappend="${#strings.contains(entry.value, 'Access Granted')} ? 'list-group-item-success' : (${#strings.contains(entry.value, 'Access Denied')} ? 'list-group-item-danger' : 'list-group-item-warning')">
                          <span th:utext="${@cedarFormatter.format('Item Request: Principal=' + cedarPrincipal + ', Action=' + cedarAction + ', Resource=' + (cedarResourceMap != null ? cedarResourceMap[entry.key] : 'Unknown ID ' + entry.key) + ' | Response: ' + entry.value)}"></span>
                      </li>
                    </ul>
                    <p th:if="${(cedarLogs == null or cedarLogs.isEmpty()) and (authorizationMap == null or authorizationMap.isEmpty())}" class="text-muted">
                      No Cedar policy evaluations occurred during the execution of this request.
                    </p>
                  </div>
                  <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
                  </div>
                </div>
              </div>
            </div>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid flex-grow-1">
    <div class="container xd-container">
      <th:block th:insert="${template}" />
    </div>
  </div>

  <div class="container mt-auto pb-5">
    <div class="row">
      <div class="col-12 text-center">
        <img src="../static/images/spring-logo.svg" th:src="@{/resources/images/spring-logo.svg}"
          alt="VMware Tanzu Logo" class="logo pt-4">
      </div>
    </div>
  </div>

  <script th:src="@{/webjars/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>

</body>

</html>
