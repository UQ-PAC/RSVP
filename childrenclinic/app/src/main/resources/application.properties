# database init
database=h2
spring.sql.init.schema-locations=classpath*:db/${database}/schema.sql
spring.sql.init.data-locations=classpath*:db/${database}/data.sql

# Web
spring.thymeleaf.mode=HTML

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Internationalization
spring.messages.basename=messages/messages

# Actuator
management.endpoints.web.exposure.include=*

# Logging
logging.level.org.springframework=INFO
# logging.level.org.springframework.web=DEBUG
# logging.level.org.springframework.context.annotation=TRACE

logging.level.uq.pac.childrenclinic.cedar=ERROR

# TRACE: the most fine-grained diagnostic output.
# DEBUG: detailed internal state, e.g. the Cedar response body in CedarService.
# INFO: general operational messages, e.g. the Cedar request summary and status code.
# WARN: potentially harmful situations, e.g. the 403 FORBIDDEN log in CedarService.
# ERROR: serious failures, e.g. a failed Cedar policy evaluation or caught exception.

# Maximum time static resources should be cached
spring.web.resources.cache.cachecontrol.max-age=12h

# Fast update of templates
spring.thymeleaf.cache=false
