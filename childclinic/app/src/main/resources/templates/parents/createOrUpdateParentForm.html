<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'parents')}">

<body>

  <h2 th:text="#{parent}">Parent</h2>
  <form th:object="${parent}" class="form-horizontal" id="add-parent-form" method="post">
    <div class="form-group has-feedback">
      <input th:replace="~{fragments/inputField :: input (#{firstName}, 'firstName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{lastName}, 'lastName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{address}, 'address', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{city}, 'city', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{telephone}, 'telephone', 'text')}" />
      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{clinics}">Clinics</label>
        <div class="col-sm-10">
          <select th:field="*{clinics}" class="form-control" multiple="multiple">
            <option th:each="clinic : ${clinics}" 
                    th:value="${clinic.clinicName}" 
                    th:text="${clinic.clinicName}">Clinic</option>
          </select>
          <span class="help-inline" th:errors="*{clinics}">[error]</span>
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button th:with="text=${parent['new']} ? #{addParent} : #{updateParent}" class="btn btn-primary" type="submit"
          th:text="${text}">Add Parent</button>
      </div>
    </div>
  </form>
</body>

</html>
