<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'adults')}">
<body>

  <h2 th:text="#{adult}">Adult</h2>
  <form th:object="${adult}" class="form-horizontal" id="add-adult-form" method="post">
    <div class="form-group has-feedback">
      <input th:replace="~{fragments/inputField :: input (#{firstName}, 'firstName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{lastName}, 'lastName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{telephone}, 'telephone', 'text')}" />
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button th:with="text=${adult['new']} ? #{addAdult} : #{updateAdult}" class="btn btn-primary" type="submit"
          th:text="${text}">Submit</button>
      </div>
    </div>
  </form>

</body>
</html>
