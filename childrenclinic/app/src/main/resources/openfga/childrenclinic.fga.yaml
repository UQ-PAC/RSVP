tests:

  # Access grants (permit policies).

  - name: "Administrator: unrestricted access"
    check:
      # All Clinic permissions.
      - user: employee:alice
        object: clinic:A
        assertions:
          can_view: true
          can_list_employees: true
          can_list_patients: true
          can_list_guardians: true
          can_add_patient: true
          can_add_guardian: true
          can_add_employee: true
      # Second Clinic.
      - user: employee:alice
        object: clinic:B
        assertions:
          can_view: true
          can_add_patient: true
          can_add_employee: true
      # Full Employee access.
      - user: employee:alice
        object: employee:james_carter
        assertions:
          can_view: true
          can_edit: true
          can_delete: true
      # Full Patient access including Visit operations.
      - user: employee:alice
        object: patient:leo_franklin
        assertions:
          can_view: true
          can_edit: true
          can_delete: true
          can_list_visits: true
          can_add_visit: true
      # Full Guardian access.
      - user: employee:alice
        object: guardian:george_franklin
        assertions:
          can_view: true
          can_edit: true
          can_delete: true
      # Full Visit access (Protected, but Administrator bypasses).
      - user: employee:alice
        object: visit:basil_davis_1
        assertions:
          can_view: true
          can_edit: true
          can_delete: true

  # Access denials (forbid policies).

  - name: "Guest: denied Patient operations"
    check:
      # Guest can list Employees but nothing else on Clinic.
      - user: guest:unknown
        object: clinic:A
        assertions:
          can_list_employees: true
          can_list_patients: false
          can_list_guardians: false
          can_view: false
          can_add_patient: false
      # Guest denied all Patient permissions.
      - user: guest:unknown
        object: patient:leo_franklin
        assertions:
          can_view: false
          can_edit: false
          can_delete: false
          can_list_visits: false
          can_add_visit: false
      # Guest denied Guardian view.
      - user: guest:unknown
        object: guardian:george_franklin
        assertions:
          can_view: false
      # Guest denied Visit view.
      - user: guest:unknown
        object: visit:leo_franklin_1
        assertions:
          can_view: false
