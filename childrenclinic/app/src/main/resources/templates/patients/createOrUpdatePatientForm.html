<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'patients')}">

<body>
  <h2 th:with="text=${patient['new']} ? #{newPatient} : #{updatePatient}" th:text="${text}">Patient Form</h2>
  <form th:object="${patient}" class="form-horizontal" method="post">
    <div class="form-group has-feedback">
      
      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{responsibleAdults}">Responsible Adults</label>
        <div class="col-sm-10">
          <select th:field="*{responsibleAdults}" class="form-control" multiple="multiple">
            <option th:each="adult : ${adults}" 
                    th:value="${adult.id}" 
                    th:text="${adult.firstName + ' ' + adult.lastName}">Adult</option>
          </select>
          <span class="help-inline" th:errors="*{responsibleAdults}">[error]</span>
        </div>
      </div>

      <input th:replace="~{fragments/inputField :: input (#{firstName}, 'firstName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{lastName}, 'lastName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{address}, 'address', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{city}, 'city', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{birthDate}, 'birthDate', 'date')}" />

      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{gender}">Gender</label>
        <div class="col-sm-10">
          <select th:field="*{gender}" class="form-control">
            <option th:each="g : ${genders}" th:value="${g.name}" th:text="${g.name}">Gender</option>
          </select>
          <span class="help-inline" th:errors="*{gender}">[error]</span>
        </div>
      </div>

      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{clinics}">Clinics</label>
        <div class="col-sm-10">
          <select th:field="*{clinics}" class="form-control" multiple="multiple">
            <option th:each="clinic : ${clinics}" th:value="${clinic.clinicName}" th:text="${clinic.clinicName}">Clinic</option>
          </select>
          <span class="help-inline" th:errors="*{clinics}">[error]</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button th:with="text=${patient['new']} ? #{addPatient} : #{updatePatient}" class="btn btn-primary" type="submit"
          th:text="${text}">Submit</button>
      </div>
    </div>
  </form>
</body>
</html>
