<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'parents')}">

<body>

  <h2>
    <th:block th:if="${visit['new']}" th:text="#{new}">New </th:block>
    Visit
  </h2>

  <b th:text="#{child}">Child</b>
  <table class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{name}">Name</th>
        <th th:text="#{birthDate}">Birth Date</th>
        <th th:text="#{gender}">Gender</th>
        <th th:text="#{parent}">Parent</th>
        <th th:text="#{clinics}">Clinics</th>
      </tr>
    </thead>
    <tr>
      <td th:text="${child.name}"></td>
      <td th:text="${#temporals.format(child.birthDate, 'yyyy-MM-dd')}"></td>
      <td th:text="${child.gender}"></td>
      <td th:text="${parent?.firstName + ' ' + parent?.lastName}"></td>
      <td th:text="${child.clinicDescriptions}"></td>
    </tr>
  </table>

  <form th:object="${visit}" class="form-horizontal" method="post">
    <div class="form-group has-feedback">
      <input th:replace="~{fragments/inputField :: input (#{date}, 'date', 'date')}" />

      <input th:replace="~{fragments/inputField :: input (#{description}, 'description', 'text')}" />

      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{confidentiality}">Confidentiality</label>
        <div class="col-sm-10">
          <select th:field="*{confidentiality}" class="form-control">
            <option th:each="conf : ${confidentialities}" 
                    th:value="${conf.name}" 
                    th:text="${conf.name}">Confidentiality</option>
          </select>
          <span class="help-inline" th:errors="*{confidentiality}">[error]</span>
        </div>
      </div>
      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{clinics}">Clinics</label>
        <div class="col-sm-10">
          <select th:field="*{clinics}" class="form-control" multiple="multiple">
            <option th:each="clinic : ${clinics}" 
                    th:value="${clinic.clinicName}" 
                    th:text="${clinic.clinicName}">Clinic</option>
          </select>
          <span class="help-inline" th:errors="*{clinics}">[error]</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <input type="hidden" name="childId" th:value="${child.id}" />
        <button class="btn btn-primary" type="submit" th:text="#{addVisit}">Add Visit</button>
      </div>
    </div>
  </form>

  <br />
  <b th:text="#{previousVisits}">Previous Visits</b>
  <table class="table table-striped">
    <tr>
      <th th:text="#{date}">Date</th>
      <th th:text="#{description}">Description</th>
      <th th:text="#{confidentiality}">Confidentiality</th>
      <th th:text="#{clinics}">Clinics</th>
    </tr>
    <tr th:if="${!visit['new']}" th:each="visit : ${child.visits}">
      <td th:text="${#temporals.format(visit.date, 'yyyy-MM-dd')}"></td>
      <td th:text=" ${visit.description}"></td>
      <td th:text="${visit?.confidentiality?.name}"></td>
      <td th:text="${visit?.clinicDescriptions}"></td>
    </tr>
  </table>

</body>

</html>
