<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'home')}">

<body>

  <div class="row">
    <div class="col-md-6">
      <img class="img-responsive" th:src="@{/resources/images/{imageName}(imageName=${@imageRandomizer.getRandomImage()})}" style="width: 245px; height: 245px;" />
      <h2 th:text="#{welcome}">Welcome</h2>
    </div>

    <div class="col-md-6">

      <div th:if="${param.error}" class="alert alert-warning">
        <span th:if="${param.error[0] == 'noPatients'}" th:text="#{error.noPatients}">No patients found.</span>
        <span th:if="${param.error[0] == 'noGuardians'}" th:text="#{error.noGuardians}">No guardians found.</span>
        <span th:if="${param.error[0] == 'noDoctors'}" th:text="#{error.noDoctors}">No doctors found.</span>
        <span th:if="${param.error[0] == 'noAssistants'}" th:text="#{error.noAssistants}">No administrative assistants found.</span>
      </div>

      <div th:if="${hasSearchAccess}" class="well">
        <form th:action="@{/search}" method="get" class="form-inline">
          <div class="form-group">
            <label for="entityType" th:text="#{search.entityType}">Search For: </label>
            <select id="entityType" name="entityType" class="form-control">
              <option th:each="entry : ${searchOptions}" th:value="${entry.key}" th:text="${entry.value}"></option>
            </select>
          </div>
          <div class="form-group">
            <input type="text" name="query" class="form-control" placeholder="Enter Last Name..." maxlength="80" />
          </div>
          <button type="submit" class="btn btn-primary" th:text="#{search}">Search</button>
        </form>
      </div>

      <hr th:if="${not #maps.isEmpty(addOptions)}" />

      <div th:if="${not #maps.isEmpty(addOptions)}">
         <div class="btn-group" role="group" aria-label="Quick Add Actions">
           <a th:each="entry : ${addOptions}" th:href="@{${entry.key}}" class="btn btn-success">
             <i class="fa fa-plus" aria-hidden="true"></i> Add <span th:text="${entry.value}"></span>
           </a>
         </div>
      </div>

    </div>
  </div>

  <br />
  <hr />

  <h2 th:text="#{doctors}">Doctors</h2>

  <table id="doctors" class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{name}">Name</th>
        <th th:text="#{specialties}">Specialties</th>
        <th th:text="#{clinics}">Clinics</th> </tr>
      </tr>
    </thead>
    <tbody>
      <tr th:each="doctor : ${listDoctors}">
        <td th:text="${doctor.firstName + ' ' + doctor.lastName}"></td>
        <td th:text="${doctor.specialtyDescriptions}"></td>
        <td th:text="${doctor.clinicDescriptions}"></td>
      </tr>
    </tbody>
  </table>
  <div th:if="${totalPages > 1}">
    <span th:text="#{pages}">Pages:</span>
    <span>[</span>
    <span th:each="i: ${#numbers.sequence(1, totalPages)}">
      <a th:if="${currentPage != i}" th:href="@{'/doctors.html?page=__${i}__'}">[[${i}]]</a>
      <span th:unless="${currentPage != i}">[[${i}]]</span>
    </span>
    <span>]&nbsp;</span>
    <span>
      <a th:if="${currentPage > 1}" th:href="@{'/doctors.html?page=1'}" th:title="#{first}"
        class="fa fa-fast-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{first}" class="fa fa-fast-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage > 1}" th:href="@{'/doctors.html?page=__${currentPage - 1}__'}" th:title="#{previous}"
        class="fa fa-step-backward"></a>
      <span th:unless="${currentPage > 1}" th:title="#{previous}" class="fa fa-step-backward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}" th:href="@{'/doctors.html?page=__${currentPage + 1}__'}" th:title="#{next}"
        class="fa fa-step-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{next}" class="fa fa-step-forward"></span>
    </span>
    <span>
      <a th:if="${currentPage < totalPages}" th:href="@{'/doctors.html?page=__${totalPages}__'}" th:title="#{last}"
        class="fa fa-fast-forward"></a>
      <span th:unless="${currentPage < totalPages}" th:title="#{last}" class="fa fa-fast-forward"></span>
    </span>
  </div>

</body>

</html>
