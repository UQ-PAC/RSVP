<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'patients')}">

<body>
  <h2 th:with="text=${patient['new']} ? #{newPatient} : #{updatePatient}" th:text="${text}">Patient Form</h2>
  <form th:object="${patient}" class="form-horizontal" method="post">
    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
      <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
    </div>

    <div class="form-group has-feedback">

      <input type="hidden" name="patientId" th:value="${patient.id}" th:if="${!patient['new']}" />

      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{guardians}">Assign Guardians</label>
        <div class="col-sm-10">
          <select name="newGuardianIds" class="form-control" multiple="multiple">
            <option th:each="guardian : ${guardians}" 
                    th:value="${guardian.id}" 
                    th:selected="${selectedGuardianIds != null and #lists.contains(selectedGuardianIds, guardian.id)}"
                    th:text="${guardian.firstName + ' ' + guardian.lastName}">Guardian</option>
          </select>
          <span class="help-inline text-muted" style="font-size: 0.85em;">Select one or more guardians to assign.</span>
        </div>
        <div class="col-sm-10">
          <select name="newAuthorityId" class="form-control">
            <option value="" disabled th:selected="${selectedAuthorityId == null}">Select Authority Role...</option>
            <option th:each="auth : ${authorities}" 
                    th:value="${auth.id}" 
                    th:selected="${selectedAuthorityId == auth.id}"
                    th:text="${auth.name}">Authority</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{doctors}">Assign Doctors</label>
        <div class="col-sm-10">
          <select name="newDoctorIds" class="form-control" multiple="multiple">
            <option th:each="doctor : ${doctors}"
                    th:value="${doctor.id}"
                    th:selected="${selectedDoctorIds != null and #lists.contains(selectedDoctorIds, doctor.id)}"
                    th:text="${doctor.firstName + ' ' + doctor.lastName}">Doctor</option>
          </select>
          <span class="help-inline text-muted" style="font-size: 0.85em;">Select one or more doctors to assign.</span>
        </div>
      </div>

      <input th:replace="~{fragments/inputField :: input (#{firstName}, 'firstName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{lastName}, 'lastName', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{address}, 'address', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{city}, 'city', 'text')}" />
      <input th:replace="~{fragments/inputField :: input (#{birthDate}, 'birthDate', 'date')}" />

      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{gender}">Gender</label>
        <div class="col-sm-10">
          <select th:field="*{gender}" class="form-control" required>
            <option th:each="g : ${genders}" th:value="${g.name}" th:text="${g.name}">Gender</option>
          </select>
          <span class="help-inline" th:errors="*{gender}">[error]</span>
        </div>
      </div>

      <div class="control-group">
        <label class="col-sm-2 control-label" th:text="#{clinics}">Clinics</label>
        <div class="col-sm-10">
          <select th:field="*{clinics}" class="form-control" multiple="multiple" required>
            <option th:each="clinic : ${clinics}" th:value="${clinic.clinicName}" th:text="${clinic.clinicName}">Clinic</option>
          </select>
          <span class="help-inline" th:errors="*{clinics}">[error]</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button th:with="text=${patient['new']} ? #{addPatient} : #{updatePatient}" class="btn btn-primary" type="submit"
          th:text="${text}">Submit</button>
        <button type="submit" class="btn btn-primary" th:formaction="@{/patients/stash-and-add-guardian}" formnovalidate
          th:text="#{addGuardian}">Add Guardian</button>
      </div>
    </div>
  </form>
</body>
</html>
