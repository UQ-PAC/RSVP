<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'parents')}">

<body>

  <h2>
    <th:block th:if="${child['new']}" th:text="#{new}">New </th:block>
    <span th:text="#{child}">Child</span>
  </h2>
  <form th:object="${child}" class="form-horizontal" method="post">
    <input type="hidden" name="id" th:value="*{id}" />
    <div class="form-group has-feedback">
      <div class="form-group">
        <label class="col-sm-2 control-label" th:text="#{parent}">Parent</label>
        <div class="col-sm-10">
          <span th:text="${parent?.firstName + ' ' + parent?.lastName}" />
        </div>
      </div>
      <input th:replace="~{fragments/inputField :: input ('Name', 'name', 'text')}" />
      <input th:replace="~{fragments/inputField :: input ('Birth Date', 'birthDate', 'date')}" />
      <input th:replace="~{fragments/selectField :: select ('Type', 'type', ${types})}" />
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button th:with="text=${child['new']} ? 'Add Child' : 'Update Child'" class="btn btn-primary" type="submit"
          th:text="${text}">Add Child</button>
      </div>
    </div>
  </form>

</body>

</html>
