<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'patients')}">

<body>

  <h2 th:text="#{patientInformation}">Patient Information</h2>

  <div th:if="${message}" class="alert alert-success" id="success-message">
    <span th:text="${message}"></span>
  </div>

  <div th:if="${error}" class="alert alert-danger" id="error-message">
    <span th:text="${error}"></span>
  </div>

  <table class="table table-striped" th:object="${patient}">
    <tr>
      <th th:text="#{name}">Name</th>
      <td><b th:text="*{firstName + ' ' + lastName}"></b></td>
    </tr>
    <tr>
      <th th:text="#{birthDate}">Birth Date</th>
      <td th:text="${#temporals.format(patient.birthDate, 'yyyy-MM-dd')}"></td>
    </tr>
    <tr>
      <th th:text="#{gender}">Gender</th>
      <td th:text="*{gender.name}"></td>
    </tr>
    <tr>
      <th th:text="#{address}">Address</th>
      <td th:text="*{address}"></td>
    </tr>
    <tr>
      <th th:text="#{city}">City</th>
      <td th:text="*{city}"></td>
    </tr>
    <tr>
      <th th:text="#{responsibleAdults}">Responsible Adults</th>
      <td>
        <span th:each="adult, iterStat : *{responsibleAdults}">
          <span th:text="${adult.firstName + ' ' + adult.lastName}"></span><span th:if="${!iterStat.last}">, </span>
        </span>
      </td>
    </tr>
    <tr>
      <th th:text="#{clinics}">Clinics</th>
      <td th:text="*{clinicDescriptions}"></td>
    </tr>
  </table>

  <a th:href="@{__${patient.id}__/edit}" class="btn btn-primary" th:text="#{editPatient}">Edit
    Patient</a>
  <a th:href="@{__${patient.id}__/visits/new}" class="btn btn-primary" th:text="#{addVisit}">Add Visit</a>

  <h2 th:text="#{visits}">Visits</h2>
  <table class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{visitDate}">Visit Date</th>
        <th th:text="#{description}">Description</th>
        <th th:text="#{confidentiality}">Confidentiality</th>
        <th th:text="#{clinics}">Clinics</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="visit : ${patient.visits}">
        <td th:text="${#temporals.format(visit.date, 'yyyy-MM-dd')}"></td>
        <td th:text="${visit?.description}"></td>
        <td th:text="${visit?.confidentiality?.name}"></td>
        <td th:text="${visit?.clinicDescriptions}"></td>
      </tr>
    </tbody>
  </table>

  <script>
    // Function to hide the success and error messages after 3 seconds
    function hideMessages() {
      setTimeout(function () {
        document.getElementById("success-message").style.display = "none";
        document.getElementById("error-message").style.display = "none";
      }, 3000); // 3000 milliseconds (3 seconds)
    }

    // Call the function to hide messages
    hideMessages();
  </script>

</body>

</html>
