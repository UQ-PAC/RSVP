# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java Tools

on:
  push:
    paths:
      - "rsvp/**"
      - ".github/workflows/rsvp.yaml"
  workflow_dispatch:

defaults:
  run:
    working-directory: rsvp

jobs:
  build:
    name: ${{ github.ref == 'refs/heads/main' && 'Build, Test & Deploy' || 'Build & Test' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Souffle
        run: |
          wget https://github.com/souffle-lang/souffle/releases/download/2.5/x86_64-ubuntu-2404-souffle-2.5-Linux.deb
          sudo apt install ./x86_64-ubuntu-2404-souffle-2.5-Linux.deb

      - name: Locate Java 21
        id: java_21
        run: echo java_21=$JAVA_HOME_21_X64 >> $GITHUB_OUTPUT

      - name: Build
        run: ./gradlew assemble
        env:
          JAVA_HOME: ${{ steps.java_21.outputs.java_21 }}

      - name: Test
        id: test
        run: ./gradlew test
        env:
          JAVA_HOME: ${{ steps.java_21.outputs.java_21 }}

      - name: Upload reports
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && steps.test.outcome != 'skipped' }}
        with:
          name: reports
          path: rsvp/build/reports
          if-no-files-found: error
          retention-days: 7

      - name: Deploy to GitHub Packages
        run: ./gradlew publish
        if: ${{ success() && (github.ref == 'refs/heads/main') }}
        env:
          JAVA_HOME: ${{ steps.java_21.outputs.java_21 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
