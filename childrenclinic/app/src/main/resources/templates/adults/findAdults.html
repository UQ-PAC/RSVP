<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'adults')}">
<body>

  <h2 th:text="#{findAdults}">Find Adults</h2>

  <form th:object="${adult}" th:action="@{/adults}" method="get" class="form-horizontal" id="search-adult-form">
    <div class="form-group">
      <div class="control-group" id="lastNameGroup">
        <div class="col-sm-10">
          <input type="text" name="query" class="form-control" placeholder="Enter Last Name..." th:field="*{lastName}" size="30" maxlength="80" />
          <span class="help-inline">
            <div th:if="${#fields.hasAnyErrors()}">
              <p th:each="err : ${#fields.allErrors()}" th:text="${err}">Error</p>
            </div>
          </span>
        </div>
      </div>
    </div>
    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button type="submit" class="btn btn-primary" th:text="#{findAdults}">Find Adults</button>
      </div>
    </div>

    <a class="btn btn-primary" th:href="@{/adults/new}" th:text="#{addAdult}">Add Adult</a>

  </form>

</body>
</html>
