# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Build Java CLI

on:
  push:
    paths:
      - "rsvp/**"
      - ".github/workflows/rsvp.yaml"
  pull_request:
    paths:
      - "rsvp/**"
      - ".github/workflows/rsvp.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install Souffle
        run: |
          wget https://github.com/souffle-lang/souffle/releases/download/2.5/x86_64-ubuntu-2404-souffle-2.5-Linux.deb
          sudo apt install ./x86_64-ubuntu-2404-souffle-2.5-Linux.deb
      - uses: actions/checkout@v4
      - name: Build with Gradle Wrapper
        run: ./gradlew build -Dpackages.user="${{ secrets.PACKAGES_USER }}" -Dpackages.token="${{ secrets.PACKAGES_TOKEN }}"
        working-directory: ./rsvp
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports
          path: rsvp/build/reports
          if-no-files-found: error
          retention-days: 7
      - name: Deploy to GitHub Packages
        working-directory: ./rsvp
        run: ./gradlew publish
        if: success() && (github.ref == 'refs/heads/main')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
