<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'administrative-assistants')}">
<body>
  <h2 th:text="#{administrativeAssistantInformation}">Assistant Information</h2>

  <div th:if="${message}" class="alert alert-success" id="success-message">
    <span th:text="${message}"></span>
  </div>
  <div th:if="${error}" class="alert alert-danger" id="error-message">
    <span th:text="${error}"></span>
  </div>

  <table class="table table-striped" th:object="${administrativeAssistant}">
    <tr>
      <th th:text="#{name}">Name</th>
      <td><b th:text="*{firstName + ' ' + lastName}"></b></td>
    </tr>
<!--    <tr>-->
<!--      <th th:text="#{birthDate}">Birth Date</th>-->
<!--      <td th:text="*{birthDate}"></td>-->
<!--    </tr>-->
<!--    <tr>-->
<!--      <th th:text="#{gender}">Gender</th>-->
<!--      <td th:text="*{gender?.name}"></td>-->
<!--    </tr>-->
    <tr>
      <th th:text="#{telephone}">Phone</th>
      <td th:text="*{telephone}"></td>
    </tr>
    <tr>
      <th th:text="#{clinics}">Clinics</th>
      <td th:text="*{clinicDescriptions}"></td>
    </tr>
  </table>

  <a th:href="@{/administrative-assistants/__${administrativeAssistant.id}__/edit}" class="btn btn-primary" th:text="#{editAdministrativeAssistant}">Edit</a>

  <script>
    function hideMessages() {
      setTimeout(function () {
        var successMessage = document.getElementById("success-message");
        var errorMessage = document.getElementById("error-message");
        if (successMessage) successMessage.style.display = "none";
        if (errorMessage) errorMessage.style.display = "none";
      }, 3000);
    }
    hideMessages();
  </script>
</body>
</html>
